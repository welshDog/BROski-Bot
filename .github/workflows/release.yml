name: Auto Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📝 Generate changelog
      id: changelog
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
        else
          CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: 🎉 Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: BROski-Bot ${{ github.ref_name }}
        body: |
          ## 🚀 What's New in ${{ github.ref_name }}
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## 📦 Installation
          
          ```bash
          docker pull ${{ secrets.DOCKER_USERNAME }}/broski-bot:${{ github.ref_name }}
          ```
          
          Or clone and run:
          ```bash
          git clone -b ${{ github.ref_name }} https://github.com/welshDog/BROski-Bot.git
          cd BROski-Bot
          ./scripts/setup.sh
          ```
          
          ## 🐶♾️ BROski$ earned for this release: 500 tokens! 💰
        draft: false
        prerelease: false