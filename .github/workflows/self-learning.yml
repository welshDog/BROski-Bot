name: Self-Learning Agent Retraining

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '10'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC

jobs:
  retrain:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: poetry install
    
    - name: Download feedback data
      run: |
        # In production, fetch from S3/MinIO/database
        echo "📥 Fetching training data..."
        mkdir -p data/training
    
    - name: Run training pipeline
      run: |
        poetry run python scripts/train_agent.py --epochs ${{ github.event.inputs.epochs || '10' }}
    
    - name: Evaluate model performance
      id: evaluate
      run: |
        poetry run python scripts/evaluate_model.py > eval_results.txt
        cat eval_results.txt
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-${{ github.sha }}
        path: data/models/
    
    - name: Deploy new model (if improved)
      run: |
        echo "🚀 Model deployment logic here"
        echo "Compare metrics, then push to production if better"
    
    - name: Create training report
      run: |
        echo "## 🧠 Self-Learning Report" > report.md
        echo "**Date**: $(date)" >> report.md
        echo "**Epochs**: ${{ github.event.inputs.epochs || '10' }}" >> report.md
        echo "**SHA**: ${{ github.sha }}" >> report.md
        cat eval_results.txt >> report.md
    
    - name: Comment on issue (if triggered manually)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('report.md', 'utf8');
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🧠 Self-Learning Training Report',
            body: report
          });
